version: 2

updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    groups:
      microsoft-packages:
        patterns:
          - "Microsoft.*"
      test-packages:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
